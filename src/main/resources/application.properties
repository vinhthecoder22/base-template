#App
server.port=8080
spring.application.name=project-base

#DATABASE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/base?createDatabaseIfNotExist=true
spring.datasource.username=
spring.datasource.password=

#JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

#JWT
jwt.secret=
#Expiration time (minutes)
jwt.access.expiration_time=
jwt.refresh.expiration_time=

#Cloudinary
cloudinary.cloud_name=
cloudinary.api_key=
cloudinary.api_secret=

#Mail
mail.username=
mail.password=

#Swagger
springdoc.api-docs.enabled=true
springdoc.packagesToScan=com.example.projectbase.controller
springdoc.pathsToMatch=/**

#Info Admin
admin.username=
admin.password=
admin.lastName=
admin.firstName=